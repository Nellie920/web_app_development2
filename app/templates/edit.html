{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card p-4">
            <h2 class="fw-bold mb-4 text-center">
                {% if recipe %}編輯食譜{% else %}新增食譜{% endif %}
            </h2>
            
            <form action="{{ url_for('recipe.edit_recipe', id=recipe.id) if recipe else url_for('recipe.create_recipe') }}" method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">食譜名稱</label>
                    <input type="text" class="form-control" id="title" name="title" value="{{ recipe.title if recipe else '' }}" required placeholder="例如：日式咖哩飯">
                </div>
                
                <div class="mb-3">
                    <label for="image" class="form-label fw-bold">上傳圖片</label>
                    <input class="form-control" type="file" id="image" name="image" accept="image/*">
                    {% if recipe and recipe.image_path %}
                        <div class="mt-2 text-muted small">
                            目前圖片：<img src="{{ url_for('static', filename=recipe.image_path) }}" height="50" class="rounded ms-2">
                        </div>
                    {% endif %}
                </div>
                
                <div class="mb-3">
                    <label for="materials" class="form-label fw-bold">所需材料</label>
                    <textarea class="form-control" id="materials" name="materials" rows="5" required placeholder="例如：&#10;洋蔥 1顆&#10;馬鈴薯 2顆&#10;紅蘿蔔 1條">{{ recipe.materials if recipe else '' }}</textarea>
                </div>
                
                <div class="mb-4">
                    <label for="steps" class="form-label fw-bold">製作步驟</label>
                    <textarea class="form-control" id="steps" name="steps" rows="8" required placeholder="例如：&#10;1. 備料：蔬菜切塊&#10;2. 炒軟洋蔥&#10;3. 加入水與咖哩塊燉煮">{{ recipe.steps if recipe else '' }}</textarea>
                </div>
                
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('recipe.detail', id=recipe.id) if recipe else url_for('recipe.index') }}" class="btn btn-secondary px-4">取消</a>
                    <button type="submit" class="btn btn-primary px-5">儲存</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
